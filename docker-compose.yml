services:
  postgres:
    image: postgres:15-alpine
    container_name: lazarus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lazarus}
      POSTGRES_USER: ${POSTGRES_USER:-lazarus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lazarus_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lazarus_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lazarus-network

  redis:
    image: redis:7-alpine
    container_name: lazarus-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lazarus-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lazarus-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lazarus_user}:${POSTGRES_PASSWORD:-lazarus_password_change_me}@postgres:5432/${POSTGRES_DB:-lazarus}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_cache:/root/.cache
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - lazarus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lazarus-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - lazarus-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: lazarus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lazarus-network

volumes:
  postgres_data:
  redis_data:
  backend_cache:

networks:
  lazarus-network:
    driver: bridge
